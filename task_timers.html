<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Task Timers</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            font-size: 20px;
        }

        #tasks {
            margin-top: 20px;
            width: 100%;
        }

        form {
            display: flex;
            flex-direction: column;
            width: 100%;
            margin-bottom: 20px;
        }

        textarea {
            resize: vertical;
            width: 100%;
            min-height: 100px;
            max-height: 400px;
            padding: 10px;
            font-size: 27px;
            margin-bottom: 10px;
            line-height: 1.4;
            box-sizing: border-box;
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            width: 150px;
            padding: 10px;
            font-size: 27px;
            cursor: pointer;
        }

        #timeDisplay {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #currentPercent {
            font-weight: bold;
            font-size: 33px;
            text-align: right;
        }

        #currentTime {
            font-weight: bold;
            font-size: 33px;
            text-align: right;
            width: 80px;
            margin-right: 20px;
        }

        /* Per-second progress bar painted via a CSS linear-gradient
           with hard color stops, one stop per second of the 25-min cycle. */
        #cycleProgressBar {
            width: 100%;
            height: 20px;
            background: #d0d0d0; /* shows through before any data is set */
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
            box-sizing: border-box;
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        .task {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f1f1f1;
            padding: 12px 15px;
            margin-bottom: 12px;
            border-radius: 6px;
            gap: 10px;
            font-size: 27px;
            width: 100%;
            box-sizing: border-box;
        }

        .task-text {
            flex: 1;
            word-break: break-word;
            white-space: pre-wrap;
            line-height: 1.4;
        }

        .task-timer {
            flex-shrink: 0;
            font-weight: bold;
            text-align: right;
            width: 80px;
        }

        .complete-btn {
            background: #44aa44;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px;
            font-size: 24px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
        }

        .complete-btn:hover {
            background: #339933;
        }

        .complete-btn::before {
            content: "✓";
            font-weight: bold;
        }

        /* Start overlay styles */
        #startOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #startButton {
            width: auto;
            padding: 30px 60px;
            font-size: 36px;
            background: #44aa44;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        #startButton:hover {
            background: #339933;
        }
    </style>
</head>

<body>
    <div id="startOverlay">
        <button id="startButton">Click to begin</button>
    </div>

    <div id="cycleProgressBar"></div>

    <form id="taskForm">
        <textarea id="taskInput" placeholder="New task" required></textarea>
        <div class="form-footer">
            <button type="submit">Add Task</button>
            <div id="timeDisplay">
                <div id="currentPercent">0.0%</div>
                <div id="currentTime">00:00</div>
            </div>
        </div>
    </form>

    <div id="tasks"></div>

    <script>
        function formatTime(seconds) {
            const m = String(Math.floor(seconds / 60)).padStart(2, "0");
            const s = String(seconds % 60).padStart(2, "0");
            return `${m}:${s}`;
        }

        const activeTasks = [];
        let audioContext = null;
        let audioInitialized = false;

        // Tracks the last 30-minute cycle index for which we auto-added a task,
        // so we don't add multiple times within the same cycle boundary.
        let lastAutoAddCycleIndex = null;

        // ---- Progress bar state ------------------------------------------------
        // The 25-min work portion is divided into WORK_SECONDS slots, one per
        // second. Each slot holds the recorded state for that past second:
        //   "green"     : a task was active during that second
        //   "missed"    : no task ran during that second (light red)
        //   "darkgray"  : the timer wasn't running yet during that second
        //                 (user clicked Start later, or this is before the cycle)
        // Slots in the future are not stored; they're rendered based on whether
        // a currently-running task's remaining time still covers that second:
        //   "lightgreen": within the remaining time of an active task, so it
        //                 will become green if the task runs to completion
        //   "lightgray" : beyond any active task's remaining time, undefined
        const WORK_SECONDS = 25 * 60;
        let cycleSlots = new Array(WORK_SECONDS).fill("darkgray");
        let currentCycleIndex = null; // matches getCurrentCycleIndex()
        let timerStarted = false;     // becomes true once the user clicks Start

        const COLORS = {
            green:      "#44aa44",
            missed:     "#f4b0b0", // light red
            darkgray:   "#888888",
            lightgreen: "#bde5bd",
            lightgray:  "#d8d8d8"
        };

        function removeTask(taskData) {
            const idx = activeTasks.indexOf(taskData);
            if (idx !== -1) activeTasks.splice(idx, 1);
            taskData.taskDiv.remove();
        }

        function updateLongestTask(now) {
            if (activeTasks.length === 0) return false;

            let currentLongestTask = null;
            let maxRemainingTime = -Infinity;
            let previousLongestTask = activeTasks.find(taskItem => taskItem.isLongest) || null;

            activeTasks.forEach(taskItem => {
                const elapsedSeconds = Math.floor((now - taskItem.startTime) / 1000);
                const remainingTime = taskItem.totalDuration - elapsedSeconds;
                if (remainingTime > 0 && remainingTime > maxRemainingTime) {
                    maxRemainingTime = remainingTime;
                    currentLongestTask = taskItem;
                }
            });

            activeTasks.forEach(taskItem => {
                taskItem.isLongest = (taskItem === currentLongestTask);
            });

            return currentLongestTask !== previousLongestTask;
        }

        function initAudioContext() {
            if (!audioInitialized) {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    audioInitialized = true;
                } catch (e) {
                }
            }
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume().then(() => {
                });
            }
        }

        function cancelAllBeepSequences() {
            activeTasks.forEach(task => {
                task.beepSequenceStarted = false;
                task.beepIndex = 0;
                task.beepTimesBeforeEnd = null;
                task.soundPlayed = false;
            });
        }

        function playTone({ freq, duration, volumeStart, volumeMiddle, volumeEnd }) {
            if (!audioContext || audioContext.state !== 'running') {
                initAudioContext();
                if (!audioContext || audioContext.state !== 'running') return;
            }

            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.type = 'sine';
            const now = audioContext.currentTime;
            oscillator.frequency.setValueAtTime(freq, now);
            gainNode.gain.setValueAtTime(volumeStart, now);
            gainNode.gain.exponentialRampToValueAtTime(volumeMiddle, now + duration / 2);
            gainNode.gain.exponentialRampToValueAtTime(volumeEnd, now + duration);
            oscillator.start(now);
            oscillator.stop(now + duration);
        }

        function playAlertSound() {
            playTone({
                freq: 800, duration: 0.5,
                volumeStart: 0.3, volumeMiddle: 0.3, volumeEnd: 0.3
            });
        }

        function playTickSound() {
            playTone({
                freq: 400, duration: 0.2,
                volumeStart: 0.0001, volumeMiddle: 0.001, volumeEnd: 0.0001
            });
        }

        function playArithmeticProgressionBeeps(taskData) {
            if (activeTasks.length === 0) {
                cancelAllBeepSequences();
                return;
            }

            cancelAllBeepSequences();

            taskData.beepSequenceStarted = true;
            taskData.beepIndex = 0;

            taskData.beepTimesBeforeEnd = [60, 52.5, 45.5, 39, 33, 27.5, 22.5, 18, 14, 10.5, 7.5, 5, 3, 1.5, 0.5];

            playAlertSound();
            taskData.beepIndex = 1;
        }

        const currentTimeEl = document.getElementById("currentTime");
        const currentPercentEl = document.getElementById("currentPercent");
        const cycleProgressBarEl = document.getElementById("cycleProgressBar");

        // Returns { cycleIndex, cycleSecond } where cycleSecond is the elapsed
        // seconds since the start of the current 30-min cycle (0..1799).
        function getCyclePosition(now) {
            const cycleMs = 30 * 60 * 1000;
            return {
                cycleIndex: Math.floor(now.getTime() / cycleMs),
                cycleSecond: Math.floor((now.getTime() % cycleMs) / 1000)
            };
        }

        // Reset slots when entering a new 30-min cycle.
        function resetCycleSlots() {
            cycleSlots = new Array(WORK_SECONDS).fill("darkgray");
        }

        // Record the state for the current second of the work portion.
        function recordCurrentSecond(now) {
            const { cycleIndex, cycleSecond } = getCyclePosition(now);

            if (currentCycleIndex === null) {
                currentCycleIndex = cycleIndex;
                resetCycleSlots();
            } else if (cycleIndex !== currentCycleIndex) {
                currentCycleIndex = cycleIndex;
                resetCycleSlots();
            }

            // Only the work portion (first 25 min) is recorded; rest portion
            // (last 5 min) doesn't touch the bar.
            if (cycleSecond >= WORK_SECONDS) return;

            // The current second's state: green if a task is active and the
            // timer was started; missed if the timer was started but no task
            // is active; darkgray remains if the timer hasn't started yet.
            let state;
            if (!timerStarted) {
                state = "darkgray";
            } else if (activeTasks.length > 0) {
                state = "green";
            } else {
                state = "missed";
            }

            // Priority: green > missed > darkgray, so a slot can't be downgraded.
            const priority = { green: 3, missed: 2, darkgray: 1 };
            const existing = cycleSlots[cycleSecond];
            if (priority[state] >= priority[existing]) {
                cycleSlots[cycleSecond] = state;
            }
        }

        // Returns the maximum remaining seconds across all active tasks (0 if none).
        // This is how far into the future the bar can confidently be painted
        // light green: any second beyond this point is undefined (light gray).
        function getMaxRemainingSeconds(now) {
            let maxRemaining = 0;
            activeTasks.forEach(task => {
                const elapsedSeconds = (now - task.startTime) / 1000;
                const remaining = task.totalDuration - elapsedSeconds;
                if (remaining > maxRemaining) maxRemaining = remaining;
            });
            return maxRemaining;
        }

        // Build a CSS linear-gradient that paints each second as a hard color
        // stop. Past seconds use the recorded slot value; future seconds use
        // lightgreen if covered by an active task's remaining time, otherwise
        // lightgray.
        function repaintProgressBar(now) {
            const { cycleSecond } = getCyclePosition(now);
            const playhead = Math.min(cycleSecond, WORK_SECONDS);

            // The future is split into two regions:
            //   [playhead .. lightGreenEnd) → lightgreen (covered by a task)
            //   [lightGreenEnd .. WORK_SECONDS) → lightgray (undefined)
            const maxRemaining = timerStarted ? getMaxRemainingSeconds(now) : 0;
            const lightGreenEnd = Math.min(
                WORK_SECONDS,
                playhead + Math.ceil(maxRemaining)
            );

            const colorAt = (i) => {
                if (i < playhead) return COLORS[cycleSlots[i]];
                if (i < lightGreenEnd) return COLORS.lightgreen;
                return COLORS.lightgray;
            };

            // Run-length encode the per-second colors into segments to keep
            // the gradient string compact.
            const total = WORK_SECONDS;
            const segments = [];
            let segStart = 0;
            let segColor = null;

            for (let i = 0; i < total; i++) {
                const c = colorAt(i);
                if (segColor === null) {
                    segColor = c;
                    segStart = i;
                } else if (c !== segColor) {
                    segments.push({
                        color: segColor,
                        startPct: (segStart / total) * 100,
                        endPct: (i / total) * 100
                    });
                    segColor = c;
                    segStart = i;
                }
            }
            segments.push({
                color: segColor,
                startPct: (segStart / total) * 100,
                endPct: 100
            });

            const stops = [];
            segments.forEach((seg) => {
                stops.push(`${seg.color} ${seg.startPct.toFixed(3)}%`);
                stops.push(`${seg.color} ${seg.endPct.toFixed(3)}%`);
            });
            cycleProgressBarEl.style.backgroundImage =
                `linear-gradient(to right, ${stops.join(", ")})`;
        }

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, "0");
            const m = String(now.getMinutes()).padStart(2, "0");
            currentTimeEl.textContent = `${h}:${m}`;

            // Calculate percentage based on 30-minute cycle (25 min work + 5 min rest)
            const totalSecondsInHour = now.getMinutes() * 60 + now.getSeconds();
            const cycleSeconds = totalSecondsInHour % (30 * 60); // position within 30-min cycle

            if (cycleSeconds < 25 * 60) {
                // Work period: 0.0% to 100.0% over 25 minutes
                const percent = (cycleSeconds / (25 * 60)) * 100;
                currentPercentEl.textContent = `${percent.toFixed(1)}%`;
            } else {
                // Rest period: show placeholder text
                currentPercentEl.textContent = "##.#%";
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Drive the progress bar at 1Hz (independent of the existing 100ms
        // background loop, which handles per-task countdowns and audio).
        setInterval(() => {
            const now = new Date();
            recordCurrentSecond(now);
            repaintProgressBar(now);
        }, 1000);
        // Initial paint so the bar isn't blank on page load.
        repaintProgressBar(new Date());

        const taskForm = document.getElementById("taskForm");
        const taskInput = document.getElementById("taskInput");
        const tasksEl = document.getElementById("tasks");

        taskForm.addEventListener("submit", (e) => {
            e.preventDefault();
            createTask();
        });

        taskInput.addEventListener("keydown", (e) => {
            if (e.ctrlKey && e.key === "Enter") {
                e.preventDefault();
                createTask();
            }
        });

        function createTask() {
            const taskName = taskInput.value.trim();
            if (!taskName) return;

            cancelAllBeepSequences();

            addTask(taskName, 300);
            taskInput.value = "";
        }

        function addTask(name, duration) {
            const taskDiv = document.createElement("div");
            taskDiv.className = "task";

            const nameEl = document.createElement("div");
            nameEl.className = "task-text";
            nameEl.textContent = name;

            const timerEl = document.createElement("div");
            timerEl.className = "task-timer";

            const startTime = new Date();
            const totalDuration = duration;

            const completeBtn = document.createElement("button");
            completeBtn.className = "complete-btn";

            taskDiv.appendChild(nameEl);
            taskDiv.appendChild(timerEl);
            taskDiv.appendChild(completeBtn);
            tasksEl.appendChild(taskDiv);

            const taskData = {
                taskDiv: taskDiv,
                timerEl: timerEl,
                startTime: startTime,
                totalDuration: totalDuration,
                soundPlayed: false,
                isLongest: false,
                lastDisplaySecond: null,
                beepSequenceStarted: false,
                beepIndex: 0,
                beepTimesBeforeEnd: null
            };

            activeTasks.push(taskData);

            timerEl.textContent = formatTime(totalDuration);

            completeBtn.onclick = () => {
                removeTask(taskData);
                // Repaint immediately: lightgreen extent shrinks (or disappears)
                // when a task is completed early.
                repaintProgressBar(new Date());
            };

            // Repaint immediately so the lightgreen extent reflects the new
            // task's remaining time without waiting for the next 1-second tick.
            repaintProgressBar(new Date());
        }

        function completeTask(taskDiv) {
            const taskData = activeTasks.find(t => t.taskDiv === taskDiv);
            if (taskData) removeTask(taskData);
        }

        // Returns an integer that uniquely identifies the current 30-minute cycle.
        // Cycles begin at :00 and :30 of every hour.
        function getCurrentCycleIndex(now) {
            // Number of full 30-minute periods since the Unix epoch.
            return Math.floor(now.getTime() / (30 * 60 * 1000));
        }

        // Checks once per tick whether we've crossed into a new 30-min cycle
        // with no active tasks; if so, auto-add the "create first task" task.
        function maybeAutoAddTask(now) {
            const cycleIndex = getCurrentCycleIndex(now);

            // Initialize on first run so we don't immediately auto-add at startup
            // (the start button already adds the initial task).
            if (lastAutoAddCycleIndex === null) {
                lastAutoAddCycleIndex = cycleIndex;
                return;
            }

            if (cycleIndex !== lastAutoAddCycleIndex) {
                // We've entered a new 30-minute cycle.
                lastAutoAddCycleIndex = cycleIndex;
                if (activeTasks.length === 0) {
                    addTask("create first task", 180);
                }
            }
        }

        document.addEventListener('click', initAudioContext);
        document.addEventListener('keydown', initAudioContext);
        document.addEventListener('touchstart', initAudioContext);
        document.addEventListener('mousedown', initAudioContext);

        let backgroundTimerInterval = null;

        function startBackgroundTimer() {
            if (backgroundTimerInterval) return;

            setInterval(() => {
                playTickSound();
            }, 5_000);

            backgroundTimerInterval = setInterval(() => {
                const now = new Date();

                // Auto-add "create first task" at each 30-min boundary if idle.
                maybeAutoAddTask(now);

                const changed = updateLongestTask(now);
                if (changed) {
                    cancelAllBeepSequences();
                }

                // Process tasks in reverse order to safely remove items
                for (let i = activeTasks.length - 1; i >= 0; i--) {
                    const task = activeTasks[i];
                    const elapsedSeconds = Math.floor((now - task.startTime) / 1000);
                    const remainingTime = task.totalDuration - elapsedSeconds;

                    if (remainingTime > 0) {
                        const currentSecond = Math.floor(remainingTime);

                        if (task.lastDisplaySecond !== currentSecond && task.timerEl) {
                            task.timerEl.textContent = formatTime(remainingTime);
                            task.lastDisplaySecond = currentSecond;
                        }

                        if (remainingTime <= 60 && task.isLongest && !task.soundPlayed) {
                            playArithmeticProgressionBeeps(task);
                            task.soundPlayed = true;
                        }

                        if (task.beepSequenceStarted && task.isLongest) {
                            const taskEndTime = new Date(task.startTime.getTime() + task.totalDuration * 1000);
                            const secondsBeforeEnd = (taskEndTime.getTime() - now.getTime()) / 1000;
                            if (task.beepIndex < task.beepTimesBeforeEnd.length) {
                                const nextBeepTime = task.beepTimesBeforeEnd[task.beepIndex];
                                if (secondsBeforeEnd <= nextBeepTime) {
                                    playAlertSound();
                                    task.beepIndex++;
                                }
                            }
                        }
                    } else {
                        removeTask(task);
                    }
                }

                // After tasks may have been removed by expiry, reflect the
                // shrunk lightgreen extent immediately.
                repaintProgressBar(now);
            }, 100);
        }

        // Start overlay handler: this click is the user gesture that unlocks audio.
        const startOverlay = document.getElementById("startOverlay");
        const startButton = document.getElementById("startButton");

        startButton.addEventListener("click", () => {
            initAudioContext();
            timerStarted = true;
            startBackgroundTimer();
            addTask("create first task", 180);
            startOverlay.remove();
        });
    </script>
</body>

</html>
